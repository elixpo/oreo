# Biome lint + format check on PRs to main
name: Biome

# Rapid force-pushes shouldn't queue up a backlog of lints.
concurrency:
  group: biome-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Use the repo's ./biome.sh wrapper — keeps one source of truth for
      # biome options (diagnostic-level, config path, etc.) between local
      # developer runs and CI.
      - run: ./biome.sh ci
