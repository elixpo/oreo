name: release

# OreoOS releases are CUT MANUALLY. There is no auto-trigger on tag push
# because we want a human to look at the badge running the release
# candidate before any other badge in the world tries to pull it.
#
# Two ways to cut a release:
#   1. Local:  python tools/release.py vX.Y.Z [--channel stable|beta]
#      (uses the gh CLI — preferred for solo or workshop releases)
#   2. Cloud:  Actions tab → "release" workflow → Run workflow
#      (this file — useful when you don't have a dev machine handy)
#
# Both paths converge on tools/build_release.py + a GitHub Release with
# manifest.json + per-file assets attached. The badge's OTA client
# picks up whichever release matches its channel.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. v1.3.0). Overrides config.py."
        required: false
      channel:
        description: "Channel name (stable | beta)"
        required: false
        default: "stable"

permissions:
  contents: write    # required to create + attach release assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve channel + version
        id: meta
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          VERSION="${{ github.event.inputs.version }}"
          # Fall back to the literal in oreoOS/config.py when the input is
          # empty. grep -oP for the v-prefixed semver; no python here so we
          # don't fight YAML's indentation rules around heredocs.
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP 'VERSION\s*=\s*"\Kv\d+\.\d+\.\d+' oreoOS/config.py || echo "v0.0.0")
          fi
          TAG="$CHANNEL/$VERSION"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release artefacts
        run: |
          # The asset-base-url makes the manifest's per-file URLs point
          # at the actual GitHub Release asset URLs once they're uploaded
          # by the next step.
          ASSET_BASE="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/"
          python tools/build_release.py \
            --version "${{ steps.meta.outputs.version }}" \
            --channel "${{ steps.meta.outputs.channel }}" \
            --notes   "${{ github.event.head_commit.message || github.event.inputs.version }}" \
            --asset-base-url "$ASSET_BASE" \
            --out dist

      - name: Flatten release files for upload
        run: |
          # Each shipping file becomes its own asset, named by replacing
          # path separators with underscores (mirrors what
          # build_release.py puts in the manifest's `url` field).
          mkdir -p upload
          cp dist/${{ steps.meta.outputs.version }}/manifest.json upload/manifest.json
          cp dist/${{ steps.meta.outputs.version }}/bundle.tar    upload/bundle.tar
          (cd dist/${{ steps.meta.outputs.version }}/files && \
            find . -type f -print0 | \
            while IFS= read -r -d '' f; do
              flat="${f#./}"
              flat="${flat//\//_}"
              cp "$f" "../../../upload/$flat"
            done)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "OreoOS ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.channel }})"
          prerelease: ${{ steps.meta.outputs.channel != 'stable' }}
          body: |
            Auto-built by `tools/build_release.py`.
            Channel: `${{ steps.meta.outputs.channel }}`
            Version: `${{ steps.meta.outputs.version }}`

            The badge's OTA client (`oreoOS/ota.py`) consumes
            `manifest.json` from this release and pulls each listed file.
            See `CONTRIBUTING.md` for the release process.
          files: |
            upload/*

      # ── GitHub Packages (Python registry) ──────────────────────────────
      # Publishes oreoos-<version>.tar.gz + .whl to GitHub Packages so
      # OreoOS appears under the repo's "Packages" sidebar. Not used by
      # the badge (which flashes via tools/deploy.py), but gives the
      # project a versioned, discoverable artefact trail.
      - name: Install build tools
        run: pip install --upgrade build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Publish to GitHub Packages (PyPI registry)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          # GitHub-hosted PyPI: https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-pypi-registry
          TWINE_REPOSITORY_URL: https://${{ github.repository_owner }}.pkg.github.com/${{ github.repository_owner }}/
        run: twine upload --skip-existing dist/oreoos-*.tar.gz dist/oreoos-*.whl
