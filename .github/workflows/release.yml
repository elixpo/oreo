name: release

# Cuts an OreoOS OTA release whenever a tag of the form
#   stable/v*  or  beta/v*  is pushed.
#
# The job builds the manifest + bundle with tools/build_release.py,
# uploads every shipping file as an individual GitHub Release asset
# (so the manifest's per-file URLs are addressable), and attaches
# manifest.json + bundle.tar alongside.
#
# Badge-side oreoOS.ota.check() then sees the new release on the
# matching channel and downloads each file by URL.

on:
  push:
    tags:
      - "stable/v*"
      - "beta/v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version (e.g. v1.3.0). Overrides config.py."
        required: false
      channel:
        description: "Channel name (stable | beta)"
        required: false
        default: "stable"

permissions:
  contents: write    # required to create + attach release assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve channel + version
        id: meta
        run: |
          # If triggered by tag: split <channel>/<version> from the ref.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            CHANNEL="${TAG%%/*}"
            VERSION="${TAG#*/}"
          else
            CHANNEL="${{ github.event.inputs.channel }}"
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(python - <<'PY'
import re, pathlib
m = re.search(r'VERSION\s*=\s*"(v\d+\.\d+\.\d+)"',
              pathlib.Path("oreoOS/config.py").read_text())
print(m.group(1) if m else "v0.0.0")
PY
)
            fi
            TAG="$CHANNEL/$VERSION"
          fi
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL"   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

      - name: Build release artefacts
        run: |
          # The asset-base-url makes the manifest's per-file URLs point
          # at the actual GitHub Release asset URLs once they're uploaded
          # by the next step.
          ASSET_BASE="https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/"
          python tools/build_release.py \
            --version "${{ steps.meta.outputs.version }}" \
            --channel "${{ steps.meta.outputs.channel }}" \
            --notes   "${{ github.event.head_commit.message || github.event.inputs.version }}" \
            --asset-base-url "$ASSET_BASE" \
            --out dist

      - name: Flatten release files for upload
        run: |
          # Each shipping file becomes its own asset, named by replacing
          # path separators with underscores (mirrors what
          # build_release.py puts in the manifest's `url` field).
          mkdir -p upload
          cp dist/${{ steps.meta.outputs.version }}/manifest.json upload/manifest.json
          cp dist/${{ steps.meta.outputs.version }}/bundle.tar    upload/bundle.tar
          (cd dist/${{ steps.meta.outputs.version }}/files && \
            find . -type f -print0 | \
            while IFS= read -r -d '' f; do
              flat="${f#./}"
              flat="${flat//\//_}"
              cp "$f" "../../../upload/$flat"
            done)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "OreoOS ${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.channel }})"
          prerelease: ${{ steps.meta.outputs.channel != 'stable' }}
          body: |
            Auto-built by `tools/build_release.py`.
            Channel: `${{ steps.meta.outputs.channel }}`
            Version: `${{ steps.meta.outputs.version }}`

            The badge's OTA client (`oreoOS/ota.py`) consumes
            `manifest.json` from this release and pulls each listed file.
            See `CONTRIBUTING.md` for the release process.
          files: |
            upload/*
